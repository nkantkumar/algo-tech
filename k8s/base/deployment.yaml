apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  labels:
    app: risk-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
    spec:
      serviceAccountName: risk-engine-ksa
      containers:
        - name: risk-engine
          image: gcr.io/PROJECT_ID/risk-engine:latest
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              value: redis
            - name: POSTGRES_HOST
              value: postgres
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
